<!DOCTYPE html>
<html lang="en">

<head>
    <title>Student Portal - SignUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

</head>

<body class="container mt-5">
    <h2>Student SignUp</h2>
    <form id="signupform">
        <div class="form-group row mt-5 mb-4">
            <label for="name" class="col-sm-2 col-form-label">Student Name</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="name" placeholder="Your Name">
            </div>
        </div>
        <div class="form-group row mt-3 mb-4">
            <label for="regno" class="col-sm-2 col-form-label">Registration Number</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="regno" placeholder="Your Registration Number">
            </div>
        </div>
        <div class="form-group row mt-3 mb-4">
            <label for="emailid" class="col-sm-2 col-form-label">Email address</label>
            <div class="col-sm-10">
                <input type="email" class="form-control" id="emailid" placeholder="name@example.com">
            </div>
        </div>
        <div class="form-group row mt-3 mb-4">
            <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
            <div class="col-sm-10">
                <input type="password" class="form-control" id="inputPassword" placeholder="Password">
            </div>
        </div>
        <div class="form-group row mt-3">
            <div class="col-sm-10 offset-sm-2">
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </div>
        </div>
    </form>

    <script src="signup.js"></script>
</body>

</html>
