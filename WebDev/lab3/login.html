<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Student Login</h2>
    <form id="loginForm">
        <div class="mt-5 mb-4">
            <label for="loginRegNo" class="form-label">Registration Number</label>
            <input type="text" class="form-control" id="loginRegNo" placeholder="Enter Reg No">
        </div>

        <div class="mt-3 mb-4">
            <label for="loginPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter Password">
        </div>

        <button type="submit" class="btn btn-success">Login</button>
        <a href="#" id="forgotPasswordLink" class="ms-3">Forgot Password?</a>
        <div class="mt-3">
            <span> New Student? </span>
            <a href="Signup.html" class="btn btn-outline-primary btn-sm ms-2"> Create Account </a>
        </div>
    </form>

    <script src="login.js"></script>
</body>
</html>
